name: Uniconnect CD - Despliegue en Fly.io

on:
  push:
    branches: [ "main", "feature/auth-service-unit-tests", "actualizar-pruebas" ]

jobs:
  test:
    name: 1. Instalar dependencias y correr pruebas
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/auth-service
          - services/social-service

    steps:
      - name: 1.1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 1.2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 1.3. Instalar dependencias para el servicio
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: 1.4. Instalar Java (requerido para el emulador de Firebase)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 1.5. Iniciar emulador de Firestore
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only firestore --project test-project &
          sleep 15
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: 1.6. Ejecutar pruebas unitarias e integración con la variable de test
        env:
          NODE_ENV: test
          PORT: 3003
          BASE_URL: http://localhost:3001
          FIRESTORE_EMULATOR_HOST: localhost:8085
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_PROJECT_ID: test-project
          GCLOUD_PROJECT: test-project
          GOOGLE_CLIENT_ID: mock-id
          GOOGLE_CLIENT_SECRET: mock-secret
          JWT_SECRET: qa_secret_key_123
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQ..."
          FIREBASE_CLIENT_EMAIL: test@example.com
        run: |
          cd ${{ matrix.service }}
          npx jest --forceExit --detectOpenHandles --testTimeout=30000

